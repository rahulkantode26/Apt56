<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eye Screening — Cataract Detection</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>👁️ Eye Screening</h1>
      <p class="subtitle">Upload a clear, close-up photo of an eye to check for signs of cataract.</p>
    </header>

    <section class="card upload-card">
      <label for="file-input" class="dropzone" id="dropzone">
        <input type="file" id="file-input" accept="image/*" hidden />
        <div id="dropzone-empty">
          <div class="dropzone-icon">＋</div>
          <p>Click to choose a photo, or drag one here</p>
          <span class="hint">JPG or PNG · a single eye, well-lit</span>
        </div>
        <img id="preview" alt="preview" hidden />
      </label>
      <button id="analyze-btn" class="btn" disabled>Analyze</button>
    </section>

    <section id="result" class="card result-card" hidden>
      <div class="result-header">
        <span id="result-badge" class="badge"></span>
        <span id="result-confidence" class="confidence"></span>
      </div>
      <div id="bars" class="bars"></div>
      <p id="explanation" class="explanation"></p>
      <p id="source-note" class="source-note"></p>
    </section>

    <p id="error" class="error" hidden></p>

    <footer>
      <p><strong>Not a medical device.</strong> This is a learning/portfolio project and its
      output is not a diagnosis. See a qualified eye care professional for any real concern.</p>
    </footer>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
